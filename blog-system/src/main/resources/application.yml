server:
  port: 8080

spring:
  application:
    name: blog-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/blog_system?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    com.yangcong.blog: INFO
